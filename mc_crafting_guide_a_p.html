<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Recipe Database (A-P)</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: rgba(30, 41, 59, 0.7); 
            --accent: #10b981; 
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            background-color: var(--bg);
            background-image: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            color: var(--text-main); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            min-height: 100vh;
            line-height: 1.5;
        }

        .header { 
            position: sticky; 
            top: 0; 
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            padding: 25px 20px; 
            z-index: 100; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        h1 { margin: 0 0 10px 0; font-size: 1.5rem; color: var(--accent); letter-spacing: 2px; }

        .search-box { 
            width: 90%; max-width: 500px; padding: 12px 25px; 
            border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(0,0,0,0.3); color: #fff; outline: none;
            transition: border-color 0.3s;
        }

        .search-box:focus { border-color: var(--accent); }

        .container { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }

        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
        }

        .recipe-card { 
            background: var(--card); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 15px; 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            transition: all 0.3s ease;
        }

        .recipe-card:hover { 
            transform: translateY(-5px); 
            border-color: var(--accent);
            background: rgba(30, 41, 59, 0.9);
        }

        .recipe-img { 
            width: 90px; 
            height: 90px; 
            object-fit: contain; 
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
        }

        .item-name { font-size: 1.2rem; margin: 10px 0; color: #fff; text-align: center; }
        .description { color: var(--text-dim); font-size: 0.85rem; text-align: center; margin: 0; }
        
        #status { color: var(--accent); font-weight: bold; margin-top: 10px; font-size: 0.9rem; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>

        { name: "Wooden Pickaxe", desc: "The very first pickaxe a player crafts to get started.", link: "https://minecraft-max.net/upload/webp/upload/iblock/9e5/9e5d472cffa1bcebde246ed4f27ac1ce.webp" },
        { name: "Piston", desc: "A mechanical redstone device that pushes blocks.", link: "https://minecraft-max.net/upload/webp/upload/iblock/ce5/ce57997891b193fd28b2fa3f862bc92b.webp" },
        { name: "Polished Andesite", desc: "A smooth grey stone block used for clean aesthetics.", link: "https://minecraft-max.net/upload/webp/upload/iblock/abc/abc269ac65b4423fe053f2e0c490f9b2.webp" },
        { name: "Polished Deepslate", desc: "A dark, durable stone from the deepest underground layers.", link: "https://minecraft-max.net/upload/webp/upload/iblock/821/82138eeb24d1ee574bfdf63df4a04788.webp" }
    ];

    const gallery = document.getElementById('gallery');
    const status = document.getElementById('status');
    const search = document.getElementById('search');

    function render(filterTerm = "") {
        const filtered = RECIPES.filter(item => 
            item.name.toLowerCase().includes(filterTerm.toLowerCase())
        );

        gallery.innerHTML = filtered.map(item => `
            <div class="recipe-card">
                <img class="recipe-img" 
                     src="${item.link}" 
                     loading="lazy" 
                     alt="${item.name}"
                     onerror="this.src='https://via.placeholder.com/90?text=Item'">
                <div class="item-name">${item.name}</div>
                <p class="description">${item.desc}</p>
            </div>
        `).join('');

        status.textContent = filterTerm 
            ? `Found ${filtered.length} matching items` 
            : `Total Items: ${RECIPES.length}`;
    }

    search.addEventListener('input', (e) => render(e.target.value));
    render();
</script>
</body>
</html>
